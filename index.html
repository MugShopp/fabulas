<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fábulas Café - Conecte-se</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: 'Ahkio';
      src: url('Ahkio-Regular.ttf') format('truetype');
    }

    body {
      background: #fff;
      font-family: 'Ahkio', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      color: #333;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 30px;
      text-align: center;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
      width: 100%;
      max-width: 320px;
      background: #f5f5f5;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: #333;
      transition: transform 0.2s;
    }

    .item:hover {
      transform: scale(1.02);
    }

    .item img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .item span {
      font-size: 18px;
    }

    footer img {
      margin-top: 40px;
      width: 120px;
      opacity: 0.8;
    }

    .xicaras {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .xicara {
      position: absolute;
      width: 40px;
      height: 40px;
      background-image: url('Xica.png');
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0.2;
      animation: flutuar 12s linear infinite;
    }

    @keyframes flutuar {
      0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 0;
      }
      30% {
        opacity: 0.2;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <h1>Clique abaixo para se conectar com a gente ☕</h1>

  <a class="item" href="https://wa.me/message/XJOCYNPNDO4DD1" target="_blank">
    <img src="whats.png" alt="WhatsApp" />
    <span>Anote nosso número na sua agenda</span>
  </a>

  <a class="item" href="https://g.page/r/CS9Wjb4xq5aJEBE/review" target="_blank">
    <img src="google.png" alt="Google Avaliações" />
    <span>Avalie-nos no Google</span>
  </a>

  <a class="item" href="https://www.instagram.com/mug.shopp?igsh=NHMxZ3pvZXVudGdq" target="_blank">
    <img src="insta.png" alt="Instagram" />
    <span>Siga-nos no Instagram</span>
  </a>

  <div class="item">
    <img src="wifi.jpg" alt="Wi-Fi" />
    <span>Rede: Fábulas Café<br>Senha: Cafe2025</span>
  </div>

  <footer>
    <img src="Fabu.jpg" alt="Logo Fábulas" />
  </footer>

  <div class="xicaras">
    <div class="xicara" style="left: 10%; animation-delay: 0s;"></div>
    <div class="xicara" style="left: 30%; animation-delay: 3s;"></div>
    <div class="xicara" style="left: 50%; animation-delay: 6s;"></div>
    <div class="xicara" style="left: 70%; animation-delay: 1s;"></div>
    <div class="xicara" style="left: 85%; animation-delay: 5s;"></div>
  </div>
</body>
</html>
