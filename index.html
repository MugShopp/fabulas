<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fábulas Café</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: 'Ahkio';
      src: url('Ahkio-Regular.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Ahkio', sans-serif;
      background: #fff;
      color: #4B3B2A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .mensagem {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #6D5844;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 15px;
      background: #F6F3EF;
      padding: 14px 20px;
      border-radius: 12px;
      margin: 12px 0;
      width: 100%;
      max-width: 400px;
      text-decoration: none;
      color: #4B3B2A;
      font-size: 1.1rem;
      transition: background 0.3s ease;
    }

    .link-item:hover {
      background: #e9e2da;
    }

    .link-item img {
      width: 36px;
      height: 36px;
    }

    footer {
      margin-top: 40px;
    }

    footer img {
      width: 120px;
      opacity: 0.8;
    }

    .xicaras {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .xicaras img {
      position: absolute;
      width: 60px;
      opacity: 0.1;
      animation: flutuar 20s linear infinite;
    }

    @keyframes flutuar {
      0% {
        transform: translateY(100vh) rotate(0deg);
      }
      100% {
        transform: translateY(-100vh) rotate(360deg);
      }
    }

  </style>
</head>
<body>

  <div class="xicaras">
    <img src="Xica.png" style="left: 10%; animation-delay: 0s;" />
    <img src="Xica.png" style="left: 40%; animation-delay: 5s;" />
    <img src="Xica.png" style="left: 70%; animation-delay: 10s;" />
  </div>

  <h1>Fábulas Café</h1>
  <p class="mensagem">Toque em um dos ícones abaixo para interagir com nossos links:</p>

  <a class="link-item" href="https://wa.me/message/XJOCYNPNDO4DD1" target="_blank">
    <img src="whats.png" alt="WhatsApp" />
    Anote nosso número na sua agenda
  </a>

  <a class="link-item" href="https://g.page/r/CS9Wjb4xq5aJEBE/review" target="_blank">
    <img src="google.png" alt="Google Avaliações" />
    Avalie-nos no Google
  </a>

  <a class="link-item" href="https://www.instagram.com/mug.shopp?igsh=NHMxZ3pvZXVudGdq" target="_blank">
    <img src="insta.png" alt="Instagram" />
    Siga-nos no Instagram
  </a>

  <div class="link-item">
    <img src="wifi.png" alt="Wi-Fi" />
    Conecte-se à nossa rede Wi-Fi<br><strong>fábulas café</strong><br><strong>Senha: Cafe2025</strong>
  </div>

  <footer>
    <img src="Fabu.png" alt="Logo Fábulas" />
  </footer>

</body>
</html>
